plugins {
    id 'fabric-loom' version '1.11.8'
    id 'maven-publish'
}

version = "1.0.0"
group = "net.vulkadroid"

base {
    archivesName = "vulkadroid"
}

repositories {
    mavenCentral()
    maven { url = "https://maven.fabricmc.net/" }
}

dependencies {
    // Setup Minecraft 1.21.1
    minecraft "com.mojang:minecraft:1.21.1"
    
    // GANTI BAGIAN INI: Pakai sintaks standar Loom buat Mojang Mappings
    mappings loom.officialMojangMappings() 
    
    modImplementation "net.fabricmc:fabric-loader:0.16.0"
}

processResources {
    inputs.property "version", project.version

    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
    // Filter argument biar gak tabrakan
    it.options.compilerArgs << "-Xlint:all" << "-AaddExports=true"
}

java {
    withSourcesJar()
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

jar {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

loom {
    mixin {
        defaultRefmapName = "vulkadroid-refmap.json"
    }
}
