plugins {
    id 'fabric-loom' version '1.11.8'
    id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

base {
    archivesName = project.archives_base_name
}

repositories {
    // Tambahkan repository jika perlu library tambahan
    mavenCentral()
}

dependencies {
    // Setup Minecraft & Mappings
    minecraft "com.mojang:minecraft:1.21.1"
    mappings lore.officialMojangMappings() // Menggunakan Official Mojang Mappings
    
    modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"

    // Opsional: Fabric API (Hapus jika mod lu gak butuh library Fabric API)
    // modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
}

processResources {
    inputs.property "version", project.version

    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
    // INI KUNCINYA: Mencegah error "Unable to locate obfuscation mapping" di GitHub/Termux
    it.options.compilerArgs << "-Xlint:all" << "-AaddExports=true"
}

java {
    withSourcesJar()

    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

jar {
    from("LICENSE") {
        rename { "${it}_${project.archivesName}" }
    }
}

// Konfigurasi Mixin
loom {
    accessWidenerPath = file("src/main/resources/vulkadroid.accesswidener") // Sesuaikan jika ada AW

    mixin {
        defaultRefmapName = "vulkadroid-refmap.json"
    }
}
