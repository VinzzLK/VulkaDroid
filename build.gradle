plugins {
    id 'fabric-loom' version '1.11.8'
    id 'maven-publish'
}

version = "1.0.0"
group = "net.vulkadroid"

base {
    archivesName = "vulkadroid"
}

repositories {
    mavenCentral()
    maven { url = "https://maven.fabricmc.net/" }
    maven { url = "https://oss.sonatype.org/content/repositories/snapshots/" }
}

dependencies {
    minecraft "com.mojang:minecraft:1.21.1"
    mappings loom.officialMojangMappings()
    modImplementation "net.fabricmc:fabric-loader:0.16.0"

    implementation "org.lwjgl:lwjgl:3.3.4"
    implementation "org.lwjgl:lwjgl-vulkan:3.3.4"

    runtimeOnly "org.lwjgl:lwjgl:3.3.4:natives-linux"
    runtimeOnly "org.lwjgl:lwjgl:3.3.4:natives-linux-arm64"
    runtimeOnly "org.lwjgl:lwjgl:3.3.4:natives-linux-arm32"

    include "org.lwjgl:lwjgl:3.3.4"
    include "org.lwjgl:lwjgl-vulkan:3.3.4"
    include "org.lwjgl:lwjgl:3.3.4:natives-linux"
    include "org.lwjgl:lwjgl:3.3.4:natives-linux-arm64"
    include "org.lwjgl:lwjgl:3.3.4:natives-linux-arm32"
}

processResources {
    inputs.property "version", project.version

    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
    it.options.compilerArgs << "-Xlint:all" << "-AaddExports=true"
}

java {
    withSourcesJar()
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

jar {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

loom {
    mixin {
        defaultRefmapName = "vulkadroid-refmap.json"
    }
}